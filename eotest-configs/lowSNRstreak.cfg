#UCD EO configuration file
# 
# Acquisition sequences to run
[ACQUIRE]
bias
dark
spot

[DESCRIPTION]
Data taken with the satellite streak at varying intensities

# Streak sequence configuration

[BIAS]
LOCATIONS = R21/Reb0        # locations to read
COUNT     = 11              # number of bias frames

[DARK]
LOCATIONS = R21/Reb0
BCOUNT    = 0

dark =     30.0   5 

[SPOT]
LOCATIONS = R21/Reb0        # locations to read
BCOUNT    = 1               # number of bias frames per dither set
IMCOUNT   = 5              # number of images per dither set
FILTER    = R
MASK      = satellite       # mask name to use

expose =    2.0   30,
            4.0   30,
            6.0   30,
            8.0   30,
           10.0   30,
           12.0   30,
           14.0   30,
           16.0   30,
           18.0   30,
           20.0   30
         
point =   0.0   0.0   0.0   # x, y, and z stage positions for dither set
